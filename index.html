<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>可爱习惯打卡</title>
    <meta name="theme-color" content="#ff9ecf" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar card">
        <h1>可爱习惯打卡</h1>
        <p>每天坚持一点点，宠物会慢慢长大</p>
      </header>

      <section class="card habits">
        <h2>我的习惯</h2>
        <form id="habit-form" class="habit-form">
          <input id="habit-emoji" maxlength="2" placeholder="😀" required />
          <input id="habit-name" maxlength="30" placeholder="习惯描述（1-30字）" required />
          <button type="submit">添加</button>
        </form>
        <ul id="habit-list" class="habit-list"></ul>
      </section>

      <section class="card today">
        <h2>今日打卡</h2>
        <p id="today-text" class="hint"></p>
        <ul id="today-checkins" class="today-checkins"></ul>
      </section>

      <section class="card calendar">
        <div class="calendar-head">
          <button id="prev-month" type="button" aria-label="上个月">←</button>
          <h2 id="month-title"></h2>
          <button id="next-month" type="button" aria-label="下个月">→</button>
        </div>
        <div class="weekdays">
          <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </section>

      <section class="card pet">
        <h2>宠物成长</h2>
        <div class="pet-main">
          <div id="pet-emoji" class="pet-emoji">🥚</div>
          <div class="pet-info">
            <p id="pet-level"></p>
            <p id="pet-growth"></p>
            <p id="pet-next" class="hint"></p>
          </div>
        </div>
        <div class="pet-stage-wrap">
          <div class="pet-stage-track">
            <div id="pet-stage-fill" class="pet-stage-fill"></div>
          </div>
          <div id="pet-stage-labels" class="pet-stage-labels">
            <span>幼崽</span><span>成长期</span><span>活力期</span><span>成熟期</span>
          </div>
        </div>
        <div id="pet-scene" class="pet-scene stage-1">
          <span class="spark s1"></span>
          <span class="spark s2"></span>
          <span class="spark s3"></span>
          <span class="pet-shadow"></span>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
